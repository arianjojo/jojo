name: Build Arian Jojo VPN

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
    
    - name: Create minimal project files
      run: |
        # حذف فایل‌های قدیمی مشکل‌دار
        rm -rf android/app/src/main/res/values/themes.xml
        rm -rf android/app/src/main/res/values-night
        
        # ایجاد themes.xml ساده
        mkdir -p android/app/src/main/res/values
        cat > android/app/src/main/res/values/themes.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <resources>
            <style name="Theme.Zyrln" parent="android:Theme.Material.Light.NoActionBar">
                <item name="android:colorPrimary">#2196F3</item>
                <item name="android:colorPrimaryDark">#1976D2</item>
            </style>
        </resources>
        EOF
        
        # بازنویسی build.gradle ساده
        cat > android/app/build.gradle << 'EOF'
        plugins {
            id 'com.android.application'
            id 'org.jetbrains.kotlin.android'
        }
        
        android {
            namespace 'com.arianjojo.vpn'
            compileSdk 34
        
            defaultConfig {
                applicationId "com.arianjojo.vpn"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
        }
        
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF
        
        # بازنویسی AndroidManifest ساده
        cat > android/app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.arianjojo.vpn">
        
            <uses-permission android:name="android.permission.INTERNET" />
        
            <application
                android:allowBackup="true"
                android:icon="@mipmap/ic_launcher"
                android:label="@string/app_name"
                android:roundIcon="@mipmap/ic_launcher_round"
                android:supportsRtl="true"
                android:theme="@style/Theme.Zyrln">
        
                <activity
                    android:name=".relay.MainActivity"
                    android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
        
            </application>
        
        </manifest>
        EOF
    
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Arian-Jojo-VPN
        path: android/app/build/outputs/apk/release/*.apk
