name: Build APK (Without Go Bindings)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 33
        build-tools: 33.0.2
        ndk-version: '23.2.8568313'
    
    - name: Create placeholder AAR
      run: |
        mkdir -p android/app/libs
        # ساخت یه فایل placeholder (چون بعداً جایگزین می‌شه)
        touch android/app/libs/zyrln.aar
    
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Arian-Jojo-VPN
        path: android/app/build/outputs/apk/release/*.apk
