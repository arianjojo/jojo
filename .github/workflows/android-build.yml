name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
    
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Setup NDK
      run: |
        echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;23.2.8568313"
    
    - name: Build AAR
      run: |
        cd android
        go run golang.org/x/mobile/cmd/gomobile@latest bind -target=android -o app/libs/zyrln.aar ../platforms/mobile
    
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: Zyrln-APK
        path: android/app/build/outputs/apk/release/*.apk
