name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        # مشخص کردن API level مناسب
        api-level: 33
        build-tools: 33.0.2

    - name: Install specific NDK version
      run: |
        # نصب NDK نسخه 25 (که با API 21 کار می‌کند)
        sudo ${ANDROID_HOME}/tools/bin/sdkmanager "ndk;25.2.9519653"
        echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        gomobile init

    - name: Build Go bindings
      run: |
        cd android
        gomobile bind -target=android -o app/libs/zyrln.aar ../platforms/mobile

    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: zyrln-vpn-apk
        path: android/app/build/outputs/apk/release/*.apk
        retention-days: 30
