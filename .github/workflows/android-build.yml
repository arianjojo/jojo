name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'  # استفاده از Java 11 به جای 17
    
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 33
        build-tools: 33.0.2
    
    - name: Install NDK 23
      run: |
        # استفاده از مسیر درست SDK manager
        export JAVA_HOME=$JAVA_HOME_11_X64
        ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;23.2.8568313"
        echo "ANDROID_NDK_HOME=${ANDROID_HOME}/ndk/23.2.8568313" >> $GITHUB_ENV
    
    - name: Install gomobile
      run: |
        go install golang.org/x/mobile/cmd/gomobile@latest
        gomobile init
    
    - name: Build Go bindings
      run: |
        cd android
        gomobile bind -target=android -o app/libs/zyrln.aar ../platforms/mobile
    
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Zyrln-VPN-App
        path: android/app/build/outputs/apk/release/*.apk
